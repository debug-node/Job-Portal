version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: job-portal-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-jobportal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job-portal-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: job-portal-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job-portal-network

  # Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: job-portal-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job-portal-network

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: job-portal-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - job-portal-network

  # Auth Service
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: job-portal-auth
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-jobportal}
      JWT_SEC: ${JWT_SEC:-your-secret-key}
      KAFKA_BROKER: kafka:9092
      REDIS_URL: ${REDIS_URL:-redis://:redis123@redis:6379}
      UPLOAD_SERVICE: ${UPLOAD_SERVICE:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    networks:
      - job-portal-network
    restart: unless-stopped

  # Job Service
  job-service:
    build:
      context: ./services/job
      dockerfile: Dockerfile
    container_name: job-portal-job
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 5003
      NODE_ENV: development
      DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-jobportal}
      JWT_SEC: ${JWT_SEC:-your-secret-key}
      KAFKA_BROKER: kafka:9092
      UPLOAD_SERVICE: ${UPLOAD_SERVICE:-http://localhost:5000}
    ports:
      - "5003:5003"
    networks:
      - job-portal-network
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: job-portal-user
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5002
      NODE_ENV: development
      DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-jobportal}
      JWT_SEC: ${JWT_SEC:-your-secret-key}
      UPLOAD_SERVICE: ${UPLOAD_SERVICE:-http://localhost:5000}
    ports:
      - "5002:5002"
    networks:
      - job-portal-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    container_name: job-portal-payment
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5001
      NODE_ENV: development
      DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-jobportal}
      JWT_SEC: ${JWT_SEC:-your-secret-key}
      Razorpay_Key: ${RAZORPAY_KEY:-test_key}
      Razorpay_Secret: ${RAZORPAY_SECRET:-test_secret}
    ports:
      - "5001:5001"
    networks:
      - job-portal-network
    restart: unless-stopped

  # Utils Service (Kafka Consumer for Email)
  utils-service:
    build:
      context: ./services/utils
      dockerfile: Dockerfile
    container_name: job-portal-utils
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT: 5004
      NODE_ENV: development
      KAFKA_BROKER: kafka:9092
      CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      API_KEY: ${CLOUDINARY_API_KEY:-}
      API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      API_KEY_GEMINI: ${GEMINI_API_KEY:-}
    networks:
      - job-portal-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job-portal-frontend
    depends_on:
      - auth-service
      - job-service
      - user-service
      - payment-service
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_RAZORPAY_KEY: ${RAZORPAY_KEY:-test_key}
    ports:
      - "3000:3000"
    networks:
      - job-portal-network
    restart: unless-stopped

networks:
  job-portal-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
